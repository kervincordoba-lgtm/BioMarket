<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="utf-8">
        <title>BioMarket - Carrito</title>
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <meta content="" name="keywords">
        <meta content="" name="description">

        <!-- Google Web Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap" rel="stylesheet"> 

        <!-- Icon Font Stylesheet -->
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

        <!-- Libraries Stylesheet -->
        <link th:href="@{/lib/lightbox/css/lightbox.min.css}" rel="stylesheet">
        <link th:href="@{/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">


        <!-- Customized Bootstrap Stylesheet -->
        <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

        <!-- Template Stylesheet -->
        <link th:href="@{/css/style.css}" rel="stylesheet">
    </head>

    <body>

        <!-- Spinner Start -->
        <div id="spinner" class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
            <div class="spinner-grow text-primary" role="status"></div>
        </div>
        <!-- Spinner End -->
        <div th:replace="~{fragments :: header('cart')}"></div>


        <!-- Modal Search Start -->
        <div class="modal fade" id="searchModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content rounded-0">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">Buscar por palabra clave</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body d-flex align-items-center">
                        <div class="input-group w-75 mx-auto d-flex">
                            <input type="search" class="form-control p-3" placeholder="Palabras clave" aria-describedby="search-icon-1">
                            <span id="search-icon-1" class="input-group-text p-3"><i class="fa fa-search"></i></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Modal Search End -->


        <!-- Single Page Header start -->
        
        <!-- Single Page Header End -->

        <br>
        <br>
        <br>
        <br>
        <br>
        <!-- Cart Page Start -->
        <div class="container-fluid py-5">
            <div class="container py-5">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                          <tr>
                            <th scope="col">Productos</th>
                            <th scope="col">Nombre</th>
                            <th scope="col">Precio</th>
                            <th scope="col">Cantidad</th>
                            <th scope="col">Total</th>
                            <th scope="col">Acciones</th>
                          </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(cart)}">
                                <td colspan="6" class="text-center py-5">
                                    <p class="mb-3">Tu carrito está vacío.</p>
                                    <a th:href="@{/shop}" class="btn border-secondary rounded-pill px-4 py-2 text-primary">Ir a la tienda</a>
                                </td>
                            </tr>
                            <tr th:each="item : ${cart}">
                                <th scope="row">
                                    <div class="d-flex align-items-center">
                                        <img th:src="@{/img/{image}(image=${item.image})}" class="img-fluid me-5 rounded-circle" style="width: 80px; height: 80px;" alt="">
                                    </div>
                                </th>
                                <td>
                                    <p class="mb-0 mt-4" th:text="${item.name}">Producto</p>
                                </td>
                                <td>
                                    <p class="mb-0 mt-4" th:text="${'$' + item.price}">$0.00</p>
                                </td>
                                <td>
                                    <div class="input-group quantity mt-4 " style="width: 100px;">
                                        <div class="input-group-btn">
                                            <form th:action="@{/cart/decrease/{id}(id=${item.productId})}" method="post">
                                                <button type="submit" class="btn btn-sm btn-minus rounded-circle bg-light border">
                                                    <i class="fa fa-minus"></i>
                                                </button>
                                            </form>
                                        </div>
                                        <input type="text" class="form-control form-control-sm text-center border-0 " th:value="${item.quantity}" readonly>
                                        <div class="input-group-btn">
                                            <form th:action="@{/cart/increase/{id}(id=${item.productId})}" method="post" >
                                                <button type="submit" class="btn btn-sm btn-plus rounded-circle bg-light border">
                                                    <i class="fa fa-plus"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <p class="mb-0 mt-4" th:text="${'$' + item.subtotal}">$0.00</p>
                                </td>
                                <td>
                                    <form th:action="@{/cart/remove/{id}(id=${item.productId})}" method="post">
                                        <button type="submit" class="btn btn-md rounded-circle bg-light border mt-4">
                                            <i class="fa fa-times text-danger"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-5">
                    <input type="text" class="border-0 border-bottom rounded me-5 py-3 mb-4" placeholder="Código de cupón">
                    <button class="btn border-secondary rounded-pill px-4 py-3 text-primary" type="button">Aplicar cupón</button>
                </div>
                <div class="row g-4 justify-content-end">
                    <div class="col-8"></div>
                    <div class="col-sm-8 col-md-7 col-lg-6 col-xl-4">
                        <div class="bg-light rounded">
                            <div class="p-4">
                                <h1 class="display-6 mb-4">Total del <span class="fw-normal">carrito</span></h1>
                                <div class="d-flex justify-content-between mb-4">
                                    <h5 class="mb-0 me-4">Subtotal:</h5>
                                    <p class="mb-0" th:text="${'$' + total}">$0.00</p>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <h5 class="mb-0 me-4">Envío</h5>
                                    <div class="">
                                        <p class="mb-0">Tarifa fija: $3.00</p>
                                    </div>
                                </div>
                                <p class="mb-0 text-end">Envío calculado al confirmar la compra.</p>
                            </div>
                            <div class="py-4 mb-4 border-top border-bottom d-flex justify-content-between">
                                <h5 class="mb-0 ps-4 me-4">Total</h5>
                                <p class="mb-0 pe-4" th:text="${'$' + total}">$0.00</p>
                            </div>
                            <div class="d-flex flex-wrap gap-3 px-4 pb-4">
                                <form th:action="@{/cart/clear}" method="post" class="mb-0">
                                    <button class="btn border-secondary rounded-pill px-4 py-3 text-primary text-uppercase" type="submit">Vaciar carrito</button>
                                </form>
                                <a th:href="@{/checkout}" class="btn btn-primary border-secondary rounded-pill px-4 py-3 text-white text-uppercase">
                                    Finalizar compra
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Cart Page End -->
        <div th:replace="~{fragments :: footer}"></div>



        <!-- Back to Top -->
        <a href="#" class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i class="fa fa-arrow-up"></i></a>   

        
    <!-- JavaScript Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/lib/easing/easing.min.js"></script>
    <script src="/lib/waypoints/waypoints.min.js"></script>
    <script src="/lib/lightbox/js/lightbox.min.js"></script>
    <script src="/lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="/js/main.js"></script>
    </body>

</html>
