<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="utf-8">
        <title>BioMarket - Pedido confirmado</title>
        <meta content="width=device-width, initial-scale=1.0" name="viewport">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
        <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
        <link th:href="@{/css/style.css}" rel="stylesheet">
    </head>

    <body>
        <div th:replace="~{fragments :: header('checkout')}"></div>

        

        <div class="container-fluid py-5">
            <div class="container py-5">
                <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="bg-white border p-4">
                            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                                <div>
                                    <p class="text-muted mb-1">Pedido</p>
                                    <h2 class="h4 mb-0">#<span th:text="${order.idOrder}">1</span></h2>
                                </div>
                                <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${order.status}">Pendiente</span>
                            </div>

                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead>
                                        <tr>
                                            <th>Producto</th>
                                            <th>Cantidad</th>
                                            <th class="text-end">Subtotal</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="detail : ${order.details}">
                                            <td th:text="${detail.product != null ? detail.product.name : 'Producto eliminado'}">Producto</td>
                                            <td th:text="${detail.quantity}">1</td>
                                            <td class="text-end">$<span th:text="${#numbers.formatDecimal(detail.subtotal, 0, 'POINT', 0, 'COMMA')}">0</span></td>
                                        </tr>
                                    </tbody>
                                    <tfoot>
                                        <tr>
                                            <th colspan="2" class="text-end">Total</th>
                                            <th class="text-end">$<span th:text="${#numbers.formatDecimal(order.total, 0, 'POINT', 0, 'COMMA')}">0</span></th>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>

                            <div class="d-flex flex-wrap gap-3 mt-4">
                                <a th:href="@{/shop}" class="btn border-secondary rounded-pill px-4 py-2 text-primary">Seguir comprando</a>
                                <a th:href="@{/cart}" class="btn btn-primary rounded-pill px-4 py-2 text-white">Ver carrito</a>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="bg-light p-4 h-100">
                            <h3 class="h5 mb-3">Datos del pedido</h3>
                            <p class="mb-2">
                                <strong>Fecha:</strong>
                                <span th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : 'Sin fecha'}">Fecha</span>
                            </p>
                            <div th:if="${order.client != null}">
                                <p class="mb-2"><strong>Cliente:</strong> <span th:text="${order.client.firstName + ' ' + order.client.lastName}">Cliente</span></p>
                                <p class="mb-2"><strong>Correo:</strong> <span th:text="${order.client.email}">correo</span></p>
                                <p class="mb-2"><strong>Teléfono:</strong> <span th:text="${order.client.phone ?: 'No registrado'}">Teléfono</span></p>
                                <p class="mb-0"><strong>Dirección:</strong> <span th:text="${order.client.address ?: 'No registrada'}">Dirección</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments :: footer}"></div>

        <a href="#" class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i class="fa fa-arrow-up"></i></a>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/main.js}"></script>
    </body>

</html>
