<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>BioMarket - Detalle del producto</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link th:href="@{/lib/lightbox/css/lightbox.min.css}" rel="stylesheet">
    <link th:href="@{/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">


    <!-- Customized Bootstrap Stylesheet -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

    <!-- Spinner Start -->
    <div id="spinner"
        class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
        <div class="spinner-grow text-primary" role="status"></div>
    </div>
    <!-- Spinner End -->
        <div th:replace="~{fragments :: header('shop')}"></div>


    

   

    <!-- Single Product Start -->
    <div class="container-fluid py-5 mt-5">
        <div class="container py-5">
            <div class="row g-4 mb-5">
                <div class="col-lg-8 col-xl-9">
                    <div class="row g-4">
                        <div class="col-lg-6">
                            <div class="border rounded">
                                <a href="#">
                                    <img th:src="@{'/img/' + ${product.image}}" class="img-fluid rounded" alt="Imagen del producto">
                                </a>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <h4 class="fw-bold mb-3" th:text="${product.name}">Brocoli</h4>
                            <p class="mb-3" th:text="'Categoria: '+${product.category.name}">Categoria: Producto</p>
                            <form th:action="@{/cart/add/{id}(id=${product.idProduct})}" method="post" class="product-actions product-detail-actions">
                                <h5 class="fw-bold product-price" th:text="${product.price}+' $'">3,35 $</h5>
                                <input type="number"
                                    name="quantity"
                                    class="form-control product-quantity-input"
                                    min="1"
                                    th:max="${product.stock}"
                                    value="1"
                                    aria-label="Cantidad">
                                <button type="submit"
                                    class="btn border border-secondary rounded-pill px-3 text-primary">
                                    <i class="fa fa-shopping-bag me-2 text-primary"></i> Agregar al carrito
                                </button>
                            </form>
                        </div>
                        <div class="col-lg-12">
                            <nav>
                                <div class="nav nav-tabs mb-3">
                                    <button class="nav-link active border-white border-bottom-0" type="button"
                                        role="tab" id="nav-about-tab" data-bs-toggle="tab" data-bs-target="#nav-about"
                                        aria-controls="nav-about" aria-selected="true">Descripcion</button>

                                </div>
                            </nav>
                            <div class="tab-content mb-5">
                                <div class="tab-pane active" id="nav-about" role="tabpanel"
                                    aria-labelledby="nav-about-tab">
                                    <p th:text="${product.description}">Descripcion del producto.</p>


                                </div>


                            </div>
                        </div>

                    </div>
                </div>

            </div>
            <h1 class="fw-bold mb-0">Productos relacionados</h1>
            <div class="vesitable">
                <div class="owl-carousel vegetable-carousel justify-content-center">
                    <div class="border border-primary rounded position-relative vesitable-item"
                        th:each="item: ${products}">
                        <div class="rounded position-relative fruite-item">
                            <div class="fruite-img">
                                <a th:href="@{/shop-detail/{id}(id=${item.idProduct})}"><img
                                        th:src="@{/img/{image}(image=${item.image})}"
                                        class="img-fluid w-100 rounded-top" th:alt="${item.image}"></a>
                            </div>
                            <div class="text-white bg-secondary px-3 py-1 rounded position-absolute"
                                style="top: 10px; left: 10px;" th:text="${item.category.name}">Categoria</div>
                            <div class="p-4 border border-secondary border-top-0 rounded-bottom">
                                <h4 th:text="${item.name}">Producto</h4>
                                <p class="product-description" th:text="${item.description}">Descripcion</p>
                                <form th:action="@{/cart/add/{id}(id=${item.idProduct})}" method="post" class="product-actions product-card-actions">
                                    <p class="text-dark fs-5 fw-bold product-price" th:text="${'$' + item.price}">$0.00</p>
                                    <input type="hidden" name="quantity" value="1">
                                    <button type="submit"
                                        class="btn border border-secondary rounded-pill px-3 text-primary">
                                        <i class="fa fa-shopping-bag me-2 text-primary"></i> Agregar al carrito
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
    <!-- Single Product End -->
        <div th:replace="~{fragments :: footer}"></div>



    <!-- Back to Top -->
    <a href="#" class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i
            class="fa fa-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/lib/easing/easing.min.js"></script>
    <script src="/lib/waypoints/waypoints.min.js"></script>
    <script src="/lib/lightbox/js/lightbox.min.js"></script>
    <script src="/lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="/js/main.js"></script>
</body>

</html>
