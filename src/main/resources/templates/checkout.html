<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

    <head>
        <meta charset="utf-8">
        <title>BioMarket - Finalizar compra</title>
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <meta content="" name="keywords">
        <meta content="" name="description">

        <!-- Google Web Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap" rel="stylesheet"> 

        <!-- Icon Font Stylesheet -->
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

        <!-- Libraries Stylesheet -->
        <link th:href="@{/lib/lightbox/css/lightbox.min.css}" rel="stylesheet">
        <link th:href="@{/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">


        <!-- Customized Bootstrap Stylesheet -->
        <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

        <!-- Template Stylesheet -->
        <link th:href="@{/css/style.css}" rel="stylesheet">
    </head>

    <body>

        <!-- Spinner Start -->
        <div id="spinner" class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
            <div class="spinner-grow text-primary" role="status"></div>
        </div>
        <!-- Spinner End -->
        <div th:replace="~{fragments :: header('checkout')}"></div>


        <!-- Modal Search Start -->
        <div class="modal fade" id="searchModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content rounded-0">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">Buscar por palabra clave</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body d-flex align-items-center">
                        <div class="input-group w-75 mx-auto d-flex">
                            <input type="search" class="form-control p-3" placeholder="Palabras clave" aria-describedby="search-icon-1">
                            <span id="search-icon-1" class="input-group-text p-3"><i class="fa fa-search"></i></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Modal Search End -->


        <!-- Single Page Header start -->
        <div class="container-fluid page-header py-5">
            <h1 class="text-center text-white display-6">Finalizar compra</h1>
            <ol class="breadcrumb justify-content-center mb-0">
                <li class="breadcrumb-item"><a href="#">Inicio</a></li>
                <li class="breadcrumb-item"><a href="#">Páginas</a></li>
                <li class="breadcrumb-item active text-white">Finalizar compra</li>
            </ol>
        </div>
        <!-- Single Page Header End -->


        <!-- Checkout Page Start -->
        <div class="container-fluid py-5">
            <div class="container py-5">
                <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>
                <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                <h1 class="mb-4">Datos de facturación</h1>
                <form th:action="@{/checkout}" method="post">
                    <div class="row g-5">
                        <div class="col-md-12 col-lg-6 col-xl-7">
                            <div class="row">
                                <div class="col-md-12 col-lg-6">
                                    <div class="form-item w-100">
                                        <label class="form-label my-3" for="firstName">Nombre<sup>*</sup></label>
                                        <input type="text" class="form-control" id="firstName" name="firstName" required>
                                    </div>
                                </div>
                                <div class="col-md-12 col-lg-6">
                                    <div class="form-item w-100">
                                        <label class="form-label my-3" for="lastName">Apellido<sup>*</sup></label>
                                        <input type="text" class="form-control" id="lastName" name="lastName" required>
                                    </div>
                                </div>
                            </div>
                            <div class="form-item">
                                <label class="form-label my-3" for="address">Dirección<sup>*</sup></label>
                                <input type="text" class="form-control" id="address" name="address" placeholder="Calle, número, barrio" required>
                            </div>
                            <div class="form-item">
                                <label class="form-label my-3" for="phone">Teléfono</label>
                                <input type="tel" class="form-control" id="phone" name="phone">
                            </div>
                            <div class="form-item">
                                <label class="form-label my-3" for="email">Correo<sup>*</sup></label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>

                        <div class="col-md-12 col-lg-6 col-xl-5">
                            <h4 class="mb-3">Tu pedido</h4>
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th scope="col">Producto</th>
                                            <th scope="col">Nombre</th>
                                            <th scope="col">Precio</th>
                                            <th scope="col">Cant.</th>
                                            <th scope="col">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:if="${#lists.isEmpty(cart)}">
                                            <td colspan="5" class="text-center py-5">
                                                <p class="mb-3">Tu carrito está vacío.</p>
                                                <a th:href="@{/shop}" class="btn border-secondary rounded-pill px-4 py-2 text-primary">Ir a comprar</a>
                                            </td>
                                        </tr>

                                        <tr th:each="item : ${cart}">
                                            <th scope="row">
                                                <div class="d-flex align-items-center mt-2">
                                                    <img th:src="${item.image != null and !#strings.isEmpty(item.image)} ? @{/img/{image}(image=${item.image})} : @{/img/fruite-item-1.jpg}" class="img-fluid rounded-circle" style="width: 70px; height: 70px; object-fit: cover;" th:alt="${item.name}">
                                                </div>
                                            </th>
                                            <td class="py-4" th:text="${item.name}">Producto</td>
                                            <td class="py-4" th:text="${'$' + item.price}">$0.00</td>
                                            <td class="py-4" th:text="${item.quantity}">1</td>
                                            <td class="py-4" th:text="${'$' + item.subtotal}">$0.00</td>
                                        </tr>

                                        <tr th:unless="${#lists.isEmpty(cart)}">
                                            <th scope="row"></th>
                                            <td class="py-4"></td>
                                            <td class="py-4"></td>
                                            <td class="py-4">
                                                <p class="mb-0 text-dark">Subtotal</p>
                                            </td>
                                            <td class="py-4">
                                                <div class="py-3 border-bottom border-top">
                                                    <p class="mb-0 text-dark" th:text="${'$' + total}">$0.00</p>
                                                </div>
                                            </td>
                                        </tr>
                                        <tr th:unless="${#lists.isEmpty(cart)}">
                                            <th scope="row"></th>
                                            <td class="py-4">
                                                <p class="mb-0 text-dark">Envío</p>
                                            </td>
                                            <td colspan="3" class="py-4">
                                                <p class="mb-0">Se calcula al confirmar la compra.</p>
                                            </td>
                                        </tr>
                                        <tr th:unless="${#lists.isEmpty(cart)}">
                                            <th scope="row"></th>
                                            <td class="py-4">
                                                <p class="mb-0 text-dark text-uppercase">TOTAL</p>
                                            </td>
                                            <td class="py-4"></td>
                                            <td class="py-4"></td>
                                            <td class="py-4">
                                                <div class="py-3 border-bottom border-top">
                                                    <p class="mb-0 text-dark fw-bold" th:text="${'$' + total}">$0.00</p>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="row g-4 text-center align-items-center justify-content-center border-bottom py-3" th:unless="${#lists.isEmpty(cart)}">
                                <div class="col-12">
                                    <div class="form-check text-start my-3">
                                        <input type="radio" class="form-check-input bg-primary border-0" id="payment-cash" name="paymentMethod" value="Contra entrega" checked>
                                        <label class="form-check-label" for="payment-cash">Pago contra entrega</label>
                                    </div>
                                    <div class="form-check text-start my-3">
                                        <input type="radio" class="form-check-input bg-primary border-0" id="payment-transfer" name="paymentMethod" value="Transferencia">
                                        <label class="form-check-label" for="payment-transfer">Transferencia bancaria</label>
                                    </div>
                                </div>
                            </div>
                            <div class="row g-4 text-center align-items-center justify-content-center pt-4">
                                <button type="submit" class="btn border-secondary py-3 px-4 text-uppercase w-100 text-primary" th:disabled="${#lists.isEmpty(cart)}">Confirmar pedido</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- Checkout Page End -->
        <div th:replace="~{fragments :: footer}"></div>



        <!-- Back to Top -->
        <a href="#" class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i class="fa fa-arrow-up"></i></a>   

        
    <!-- JavaScript Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/lib/easing/easing.min.js"></script>
    <script src="/lib/waypoints/waypoints.min.js"></script>
    <script src="/lib/lightbox/js/lightbox.min.js"></script>
    <script src="/lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="/js/main.js"></script>
    </body>

</html>
